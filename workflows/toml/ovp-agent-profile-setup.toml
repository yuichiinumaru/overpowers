description = "Creates a personalized continuity file and memory slot entry for a new agent, and performs initial project analysis to build context."

prompt = '''
# Agent Profile Initialization Workflow

When a new agent assumes this workflow, they MUST follow these steps precisely to establish their continuity and contextual awareness in the project.

## Step 1: List Existing Continuity Files
List all `continuity-*.md` files in `.agents/` to see which agent profiles already exist.

## Step 2: Choose an Agent Name
Select a unique identifier/name for yourself that is different from any existing `continuity-[name].md` files.

## Step 3: Create Continuity File
Create a new file named `.agents/continuity-[your-name].md`. You will use this file for your own continuity tracking.

## Step 4: Initialize Memcord Slot
1. Check the name of the repository you are working in.
2. Identify the `memcord` slot corresponding to this repository using the memcord tools.
3. Create a new entry for yourself in this slot. You will use this entry from now on to record your progress and state.

## Step 5: Additive Updates
When updating your `continuity-[your-name].md` file and your memcord slot, you MUST do so **additively**. This means you only append new blocks of information. **Never delete** previous information from these records.

## Step 6: Contextual Deep Dive
After establishing your identity and continuity records, build your context by executing the following read operations:
1. Read all entries in the project's memcord slot.
2. Read the memories available via the Serena MCP (list them first, then read relevant ones).
3. Read the project documentation located in `docs/` (e.g., architecture, guides).
4. Analyze the codebase to get a high-level understanding of how the system works.

Once Step 6 is complete, you will be situated in the project and fully prepared to receive and execute tasks.
'''
