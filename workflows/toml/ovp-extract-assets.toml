description = "Process a batch of raw staged assets, standardize them, and integrate them into the repository."

prompt = '''
# /ovp-extract-assets (Mass Asset Integration)

**Context**: Use this workflow when processing a batch task generated by the `asset-extraction` pipeline. The items are located in `.archive/staging/`.

**Goal**: Standardize and move staged files to their final destinations, then update the task file to check them off.

## Actions

1. **Load Task**: Read `.docs/tasks/<task-file>` to get the list of staged files assigned to this batch.
2. **Iterate Through Items**: For each unchecked file in the list:
   - **Analyze**: Read the file from `.archive/staging/...` to understand its content and purpose. If it's empty, garbled, or obviously extremely low quality, note it as `[Skipped]` in the task file, delete the staged file, and move to the next.
   - **Format**: Create the standardized version:
     - **For Skills**: Generate YAML frontmatter. Name it `<domain>-<subdomain>-<specific-name>`. 
     - **For Agents**: Generate YAML frontmatter (`name: "ovp-..."`, `description: "..."`, `category: ...`). Name it `ovp-<name>.md`.
     - **For Workflows**: Generate basic header block (`--- description: ... ---`). Name it `ovp-<name>.md`.
   - **Save**: Write the formatted content to the appropriate final location (`skills/<name>/SKILL.md`, `agents/ovp-<name>.md`, etc.).
   - **Clean**: Delete the original file from the staging directory.
   - **Check Off**: Update `.docs/tasks/<task-file>` to replace `[ ]` with `[x]` for this item.
3. **Completion**: Once all items in the batch are processed (either saved or skipped), announce completion. If using a subagent or running out of context, summarize progress and instruct the user to run the command again to continue the batch.
'''
