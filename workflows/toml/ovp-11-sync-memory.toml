description = "Read recent session logs, cross-reference with .agents/memories/, and synchronize declarative knowledge into vector DBs or knowledge bases."

prompt = '''
## User Input

```text
$ARGUMENTS
```

You **MUST** consider the user input before proceeding (if not empty).

## Objective

Prevent long-term context degradation by explicitly moving insights from short-term conversational memory (`jj op log`, session logs, recent changes) into persistent, structured declarative memory (Memcord, Serena, or JSON Knowledge Graph).

## Execution Flow

1. **Information Gathering.**
   - Read the recent commit history via `jj log -n 10` or `jj op log`.
   - Read `.agents/continuity-<agent-name>.md` to grasp the current context.
   - Review any recently generated reports in `.agents/thoughts/` or `.agents/reports/`.

2. **Delta Analysis.**
   - Compare recent actions with existing files in `.agents/memories/` or `.serena/memories/`.
   - Identify what new architectural decisions, bug solutions, or project conventions have been established that are NOT yet documented in persistent memory.

3. **Knowledge Structuring.**
   - For each new insight, structure a concise "Memory Object".
   - Categorize it by domain (e.g., `orchestration`, `vcs`, `frontend`, `auth`).

4. **Persist to Memory Systems.**
   - Update the relevant JSON Knowledge Graph file with new nodes or relationships.
   - Write memory files to `.agents/memories/` (which may be symlinked to Serena).
   - If Memcord tool is available, use `memcord_save` to persist the structured insight.
   - If Serena tool is available, use `write_memory`.

5. **Report to User.**
   - List the newly synthesized memories.
   - Indicate which databases/systems were successfully updated.
'''
