description = "Extract ongoing or vibecoded work into a formalized, tracked task checklist."

prompt = '''
# /03-task-ongoing (Syncing Unguided Work)

**Context**: Use this workflow when development has already started (e.g., via "vibecoding") BUT the tasks are not being properly tracked in `docs/tasks/` or `tasklist.md`. 

**Goal**: Reverse-engineer what is being done into a master task file to ensure VCS and tracking alignment without losing momentum.

## Actions

1. **Analyze Current State (Explicit Memory Read)**: 
   - Read `.agents/continuity-<agent-name>.md` and check `.agents/memories/` for historical context on the ongoing work.
   - Review recent tool executions, edited files, and the agent's current memory/thoughts.
   - Clarify with the user what the end goal of the current unguided session is.

2. **Determine Scope**: 
   - Define a clear boundary for the task so that it doesn't suffer from feature creep.
   - Formalize the remaining steps to get the current work to a "Complete" state.

3. **Create Retroactive Master Task**: 
   - Generate `docs/tasks/nnnn-type-subtype-[name].md` using the standard convention.
   - Document what has already been done, marking those subtasks as `[x]`.
   - Document what is left to do, leaving those subtasks as `[ ]`.

4. **Update Status (Explicit Memory Update)**: 
   - Append this retroactive master task in `docs/tasklist.md` under the appropriate section.
   - Mark its status as `[/]` (In Progress).
   - Update `.agents/continuity-<agent-name>.md` to reflect this newly formalized task as the "Current Focus".
   - Resume work systematically.
'''
