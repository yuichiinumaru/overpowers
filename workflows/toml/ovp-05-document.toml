description = "Finalize a completed task, audit changes, update memories, and close bookmarks."

prompt = '''
# /05-document (Knowledge Closure)

**Goal**: Provide the perfect algorithmic closure to a task by rendering its legacy into persistent memory, auditing the VCS trail, and signaling final completion.

## Actions

1. **Context Initialization (Explicit Memory Read)**:
   - Read `.agents/continuity-<agent-name>.md` and check `.agents/memories/` to ensure full context alignment before documenting closure.
   - Cross-reference the master task file and the generated code to identify what needs to be persisted.

2. **Audit Changelog**: Execute the `/14-changelog-audit` workflow. This guarantees that all Jujutsu operations or Git commits forged during execution are mirrored in the centralized `CHANGELOG.md`.

3. **Sync Short-to-Long Memory (Explicit Memory Update)**: Execute the `/11-sync-memory` workflow.
   - Aggregate the contextual discoveries and decisions compiled along the `01` through `04` pipeline.
   - Force an update into the `.archive/SYSTEM_KNOWLEDGE_GRAPH.json` (or central repo if relocated) to ensure all agents share real-time cognizance of the new integrations.
   - Propagate artifacts logically into `.agents/memories/` (Serena/Memcord).

4. **Mark Complete & Ledger Update**: 
   - Access `docs/tasklist.md`.
   - Re-mark the master task corresponding to this cycle from `[/]` to `[x]` indicating absolute resolution.
   - Update the Session Ledger (`.agents/continuity-<agent-name>.md`) to move the completed task to the "Completed Tasks" section and clear the active branch if applicable.

5. **Close VCS**: Facilitate the architectural closure of the working branch/bookmark. Provide guidance corresponding to the `AGENTS.md` parameters such as `harmonious-jujutsu-merge` to ensure the code ascends cleanly into staging/development or awaits human PR approval structure.
'''
