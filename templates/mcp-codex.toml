# =============================================================================
# Overpowers MCP Server Configuration for Codex CLI
# =============================================================================
# Merge this into ~/.codex/config.toml
# Codex CLI uses TOML format with [mcp_servers.<name>] sections
# =============================================================================

[mcp_servers.hyperbrowser]
command = "npx"
args = ["--yes", "hyperbrowser-mcp"]
[mcp_servers.hyperbrowser.env]
HYPERBROWSER_API_KEY = "${HYPERBROWSER_API_KEY}"

[mcp_servers.genkit-mcp-server]
command = "npx"
args = ["-y", "genkit-cli@^1.28.0", "mcp", "--explicitProjectRoot", "--no-update-notification", "--non-interactive"]

[mcp_servers.memcord]
command = "${MEMCORD_PYTHON_PATH}"
args = ["-m", "memcord.server"]
[mcp_servers.memcord.env]
PYTHONPATH = "${MEMCORD_SRC_PATH}"
MEMCORD_ENABLE_ADVANCED = "true"

[mcp_servers.vibe_check]
command = "node"
args = ["${VIBE_CHECK_PATH}"]
[mcp_servers.vibe_check.env]
GEMINI_API_KEY = "${GEMINI_API_KEY}"
MCP_TRANSPORT = "stdio"


[mcp_servers.semgrep.env]
PATH = "${SEMGREP_SYSTEM_PATH}"

[mcp_servers.in_memoria]
command = "node"
args = ["${IN_MEMORIA_PATH}", "server"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
[mcp_servers.context7.env]
CONTEXT7_API_KEY = "${CONTEXT7_API_KEY}"

[mcp_servers.playwright_browser]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]

[mcp_servers.serena]
command = "uvx"
args = ["--from", "${SERENA_PATH}", "serena", "start-mcp-server", "--context", "ide-assistant"]

[mcp_servers.notebooklm]
command = "uvx"
args = ["--from", "${NOTEBOOKLM_PATH}", "notebooklm-mcp"]
[mcp_servers.desktop-commander]
command = "npx"
args = ["-y", "@smithery/cli", "run", "desktop-commander", "--config", "{\"instructions\":\"\"}"]
