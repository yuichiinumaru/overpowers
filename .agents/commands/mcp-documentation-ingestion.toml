description = "Ingest and map comprehensive library or framework documentation into memory systems."

prompt = '''
# /mcp-documentation-ingestion

**Goal**: Ingest comprehensive documentation from a library or framework (e.g., Agno, SurrealDB, FastMCP) into local memory systems (NotebookLM, Serena, or Memcord) for retrieval during development.

## Actions

1. **Target Identification**:
   - Verify the base URL of the documentation.
   - Restrict the crawler or fetching tool to stay within the documentation domain and not follow external links.

2. **Link Extraction & Deduplication**:
   - Use web tools (e.g., `tavily-web`, `web-to-markdown`, or `browser-use`) to recursively fetch all available documentation page links.
   - Deduplicate the extracted links to avoid redundant ingestion.

3. **Data Compilation & Routing**:
   - Count the total number of deduplicated links.
   - **If under 200 links**:
     - Prepare the list of direct URLs for direct ingestion into NotebookLM as sources.
   - **If over 200 links (Batching Mode)**:
     - Iteratively visit each link, convert its content into Markdown (`.md`), and group related pages by semantic topic (e.g., `API_Reference.md`, `Quickstart.md`, `Authentication.md`).
     - Save these grouped markdown files locally.

4. **Memory Injection**:
   - **NotebookLM (Preferred for Frameworks)**: Create a new Notebook with the Framework/Library name. Upload all the URLs (if under 200) or the combined Markdown files (if over 200) as sources.
   - **Serena / Memcord (Alternative/Complementary)**: If NotebookLM is unavailable or project-specific context is preferred, upload the formatted markdown files into the respective project memory slot.

5. **Validation**:
   - Run a test query against the chosen memory system to ensure the knowledge was ingested correctly and the RAG pipeline is actively retrieving it without hallucinations.
'''
