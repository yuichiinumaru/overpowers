description = "Compare the structured SYSTEM_KNOWLEDGE_GRAPH.json against the actual codebase to detect architectural drift or violations."

prompt = '''
## User Input

```text
$ARGUMENTS
```

You **MUST** consider the user input before proceeding (if not empty).

## Objective

Identify instances where the actual codebase (folder structures, API contracts, naming, routing) has deviated from the documented architecture in the JSON Knowledge Graph or architectural specifications.

## Execution Flow

1. **Load Reference Architecture.**
   - Parse `docs/knowledge/SYSTEM_KNOWLEDGE_GRAPH.json` (or equivalent structural map).
   - Identify defined domains, major modules, and explicit relationship rules (e.g., "API must only be called via Service layer").

2. **Scan Reality.**
   - Use codebase tools (e.g., `list_dir`, `grep_search`, `ast_grep`) to verify the actual state.
   - Check if modules exist where they are supposed to.
   - Look for rogue dependencies (e.g., a React component directly querying a database file, violating the graph).

3. **Identify Drift.**
   - For every discrepancy found, classify its severity:
     - `CRITICAL`: Security boundary violation or major architectural pattern broken.
     - `WARNING`: File placed in wrong module or bypass of abstraction layer.
     - `INFO`: Outdated comment or missing minor file.

4. **Generate Drift Report.**
   - Create `.agents/thoughts/architecture-drift-report.md`.
   - Map each violation with a specific code location and the rule it broke.
   - Suggest remediation for each (refactoring task vs documentation update).

5. **Present to User.**
   - Summarize the drift state.
   - Ask the user: "Should I update the Knowledge Graph to match reality, or should we create tasks to refactor the code back to the planned architecture?"
'''
