description = "Sweep the docs/ directory and archive obsolete, outdated, or redundant files."

prompt = '''
## User Input

```text
$ARGUMENTS
```

You **MUST** consider the user input before proceeding (if not empty).

## Objective

Perform a comprehensive review of the `docs/` directory and move any obsolete, outdated, or irrelevant files to `.archive/docs/`.

## Execution Flow

1. **Inventory the docs/ directory.**
   - List all files and subdirectories recursively.
   - Count total files and categorize by type (markdown, images, configs, etc.).

2. **Analyze each file for relevance.**
   - For each document, check:
     - **Last modified date** — files untouched for more than 6 months are candidates.
     - **Content staleness** — references to deprecated APIs, old version numbers, or removed features.
     - **Orphan status** — documents not referenced by any other file, README, or tasklist.
     - **Duplication** — content that exists elsewhere in a more current form.
   - Categorize each file as: `KEEP`, `ARCHIVE`, or `ASK_USER`.

3. **Present findings to the user.**
   - List files marked `ARCHIVE` with the reason for each.
   - List files marked `ASK_USER` with the reasoning and ask for a decision.
   - List files marked `KEEP` briefly (no action needed).

4. **Execute archival (after user approval).**
   - Create `.archive/docs/` directory structure mirroring the original paths.
   - Move approved files using `mv` (NEVER use `rm`).
   - Preserve the directory hierarchy inside `.archive/docs/`.

5. **Update references.**
   - Search the codebase for any links or references to archived files.
   - Report any broken references found so the user can decide how to handle them.

6. **Report summary.**
   - Files archived (count and list).
   - Files kept (count).
   - Any broken references detected.
   - Storage space freed (approximate).
'''
