description = "Mine the .archive/ directory for reusable ideas, lost files, and planning opportunities."

prompt = '''
## User Input

```text
$ARGUMENTS
```

You **MUST** consider the user input before proceeding (if not empty).

## Objective

Analyze the `.archive/` directory to extract actionable ideas, recover misplaced files, and generate new task proposals for `docs/tasks/planning/`.

## Execution Flow

1. **Inventory the archive.**
   - List all files recursively in `.archive/`.
   - Categorize by original location (inferred from path or content).
   - Note file types and rough content descriptions.

2. **Analyze each file for reuse potential.**
   - For each file, determine if it is:
     - **A lost file**: Code, config, or documentation that appears to have been archived by accident or merge conflict. Could be restored to its proper location.
     - **An unfinished task**: A task file, planning doc, or blueprint that was never completed.
     - **A report with actionable findings**: Performance audits, security scans, or reviews that identified issues which may still be open.
     - **A spec or blueprint**: Feature specs, architectural designs, or proposals that were shelved but could still be relevant.
     - **Dead/irrelevant**: Truly obsolete content with no reuse value.

3. **Recover lost files.**
   - For files identified as "lost", propose their correct destination.
   - Present each suggestion to the user for approval before moving.

4. **Generate planning proposals.**
   - For unfinished tasks, reports with actionable findings, and relevant specs:
     - Perform a semantic search (using codebase tools or grep) across `docs/` and `src/` to verify if the core idea hasn't already been implemented under a different name.
     - Cross-reference with the current codebase to check if the issue/feature was already addressed.
     - If NOT addressed, draft a proposal file in `docs/tasks/planning/` following the task template.
     - Include a reference to the original archived file in the proposal.

5. **Report findings to the user.**
   - **Recovered files**: List of files suggested for recovery with destinations.
   - **New proposals**: List of planning proposals created, with brief summaries.
   - **Dead files**: List of files confirmed as truly irrelevant (no action needed).
   - **Statistics**: Total files analyzed, proposals generated, files recovered.
'''
