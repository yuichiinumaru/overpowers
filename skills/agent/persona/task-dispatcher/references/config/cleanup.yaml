# =============================================================================
# Task-Dispatcher Configuration: cleanup.yaml
# =============================================================================
# 清理规则配置 - 定义临时文件分类、清理规则和黑/白名单
# =============================================================================

# =============================================================================
# 全局清理配置
# =============================================================================
global:
  enabled: true
  cleanup_on_start: true       # 启动时清理
  cleanup_on_complete: true   # 任务完成时清理
  cleanup_on_error: true      # 错误时清理
  dry_run: false              # 试运行模式（不实际删除）
  log_deletions: true         # 记录删除操作

# =============================================================================
# 临时文件分类
# =============================================================================
file_categories:
  # ---------------------------------------------------------------------------
  # 构建产物
  # ---------------------------------------------------------------------------
  build_artifacts:
    name: "Build Artifacts"
    priority: 1
    patterns:
      - "**/dist/"
      - "**/build/"
      - "**/out/"
      - "**/*.pyc"
      - "**/__pycache__/"
      - "**/*.class"
      - "**/*.o"
      - "**/*.so"
      - "**/*.dylib"
      - "**/node_modules/.cache/"
    retention:
      max_age_hours: 24
      max_size_mb: 1000
    cleanup_strategy: "age_based"

  # ---------------------------------------------------------------------------
  # 编译缓存
  # ---------------------------------------------------------------------------
  compilation_cache:
    name: "Compilation Cache"
    priority: 2
    patterns:
      - "**/.cache/"
      - "**/target/debug/"
      - "**/target/release/"
      - "**/.gradle/"
      - "**/.m2/"
      - "**/.npm/"
      - "**/.eslintcache"
      - "**/.tsbuildinfo"
    retention:
      max_age_hours: 168  # 7 天
    cleanup_strategy: "size_based"

  # ---------------------------------------------------------------------------
  # 日志文件
  # ---------------------------------------------------------------------------
  log_files:
    name: "Log Files"
    priority: 3
    patterns:
      - "**/*.log"
      - "**/logs/"
      - "**/*.log.*"
    retention:
      max_age_hours: 72    # 3 天
      max_size_mb: 500
      keep_latest: 10
    cleanup_strategy: "age_and_count"

  # ---------------------------------------------------------------------------
  # 临时文件
  # ---------------------------------------------------------------------------
  temp_files:
    name: "Temporary Files"
    priority: 1
    patterns:
      - "**/tmp/"
      - "**/temp/"
      - "**/*.tmp"
      - "**/*.temp"
      - "**/.DS_Store"
      - "**/Thumbs.db"
      - "**/*~"
      - "**/#*#"
    retention:
      max_age_hours: 24
    cleanup_strategy: "age_based"

  # ---------------------------------------------------------------------------
  # 测试产物
  # ---------------------------------------------------------------------------
  test_artifacts:
    name: "Test Artifacts"
    priority: 4
    patterns:
      - "**/coverage/"
      - "**/.nyc_output/"
      - "**/htmlcov/"
      - "**/.pytest_cache/"
      - "**/test-results/"
      - "**/*.test.js"
      - "**/*.spec.js"
    retention:
      max_age_hours: 72
    cleanup_strategy: "age_based"

  # ---------------------------------------------------------------------------
  # 开发工具缓存
  # ---------------------------------------------------------------------------
  dev_tools_cache:
    name: "Development Tools Cache"
    priority: 5
    patterns:
      - "**/.vscode/.cache/"
      - "**/.idea/caches/"
      - "**/.env.local"
      - "**/.env.*.local"
    retention:
      max_age_hours: 168
    cleanup_strategy: "manual"

  # ---------------------------------------------------------------------------
  # 媒体缓存
  # ---------------------------------------------------------------------------
  media_cache:
    name: "Media Cache"
    priority: 6
    patterns:
      - "**/*.mp4"
      - "**/*.avi"
      - "**/*.mov"
      - "**/*.mp3"
      - "**/*.wav"
      - "**/*.jpg"
      - "**/*.png"
      - "**/*.gif"
    retention:
      max_age_hours: 24
      max_size_mb: 5000
    cleanup_strategy: "size_based"

# =============================================================================
# 清理规则
# =============================================================================
cleanup_rules:
  # ---------------------------------------------------------------------------
  # 规则 1: 按年龄清理
  # ---------------------------------------------------------------------------
  - name: "cleanup_old_builds"
    enabled: true
    categories:
      - "build_artifacts"
    conditions:
      - type: "age"
        threshold_hours: 24
    action: "delete"
    priority: 1

  # ---------------------------------------------------------------------------
  # 规则 2: 按大小清理
  # ---------------------------------------------------------------------------
  - name: "cleanup_large_caches"
    enabled: true
    categories:
      - "compilation_cache"
      - "media_cache"
    conditions:
      - type: "size"
        threshold_mb: 1000
        operator: "greater_than"
    action: "delete_oldest"
    priority: 2

  # ---------------------------------------------------------------------------
  # 规则 3: 任务完成后清理
  # ---------------------------------------------------------------------------
  - name: "cleanup_task_artifacts"
    enabled: true
    categories:
      - "temp_files"
      - "log_files"
    conditions:
      - type: "age"
        threshold_hours: 1
    action: "delete"
    priority: 1

  # ---------------------------------------------------------------------------
  # 规则 4: 按任务状态清理
  # ---------------------------------------------------------------------------
  - name: "cleanup_successful_tasks"
    enabled: true
    categories:
      - "temp_files"
      - "build_artifacts"
    when:
      task_status: "success"
    action: "delete"
    priority: 1

  - name: "keep_failed_task_logs"
    enabled: true
    categories:
      - "log_files"
    when:
      task_status: "failed"
    action: "keep"
    retention:
      max_age_days: 30

  # ---------------------------------------------------------------------------
  # 规则 5: 定期清理
  # ---------------------------------------------------------------------------
  - name: "weekly_deep_cleanup"
    enabled: true
    schedule: "0 2 * * 0"  # 每周日凌晨 2 点
    categories:
      - "dev_tools_cache"
      - "test_artifacts"
    conditions:
      - type: "age"
        threshold_hours: 168
    action: "delete"
    priority: 3

# =============================================================================
# 黑名单 - 永不删除的文件/目录
# =============================================================================
blacklist:
  # ---------------------------------------------------------------------------
  # 重要文件（绝对不删除）
  # ---------------------------------------------------------------------------
  paths:
    - "**/.git/"
    - "**/.gitignore"
    - "**/LICENSE*"
    - "**/README*"
    - "**/CHANGELOG*"
    - "**/.env"
    - "**/.env.production"
    - "**/secrets.yaml"
    - "**/credentials.json"
    - "**/id_rsa*"
    - "**/id_ed25519*"
    - "**/.aws/"
    - "**/config/secrets/"
    
  # ---------------------------------------------------------------------------
  # 重要目录
  # ---------------------------------------------------------------------------
  directories:
    - "/Users/xiaotiac/.openclaw/workspace"
    - "/Users/xiaotiac/.openclaw/agents"
    - "**/src/"
    - "**/lib/"
    - "**/include/"
    - "**/config/"
    
  # ---------------------------------------------------------------------------
  # 文件扩展名（永不删除）
  # ---------------------------------------------------------------------------
  extensions:
    - ".yaml"
    - ".yml"
    - ".json"
    - ".md"
    - ".txt"
    - ".conf"
    - ".cfg"
    - ".toml"
    - ".xml"

# =============================================================================
# 白名单 - 始终保留的文件
# =============================================================================
whitelist:
  # ---------------------------------------------------------------------------
  # 用户标记保留的文件
  # ---------------------------------------------------------------------------
  paths:
    - "**/.keep"
    - "**/.keepalive"
    - "**/.persist"
    
  # ---------------------------------------------------------------------------
  # 特定模式
  # ---------------------------------------------------------------------------
  patterns:
    - "**/important/**"
    - "**/archive/**"
    - "**/persistent/**"
    
  # ---------------------------------------------------------------------------
  # 标签系统
  # ---------------------------------------------------------------------------
  tags:
    - name: "persistent"
      description: "持久化存储，不清理"
    - name: "backup"
      description: "备份文件，保留 30 天"
      retention_days: 30

# =============================================================================
# 清理执行配置
# =============================================================================
execution:
  # ---------------------------------------------------------------------------
  # 并行清理限制
  # ---------------------------------------------------------------------------
  max_parallel_deletes: 10
  delete_batch_size: 100
  
  # ---------------------------------------------------------------------------
  # 安全性
  # ---------------------------------------------------------------------------
  require_confirmation: false  # 大文件删除需要确认
  large_file_threshold_mb: 100
  move_to_trash: true          # 移至回收站而非永久删除
  
  # ---------------------------------------------------------------------------
  # 性能
  # ---------------------------------------------------------------------------
  scan_threads: 4
  io_priority: "low"
  
  # ---------------------------------------------------------------------------
  # 清理后处理
  # ---------------------------------------------------------------------------
  post_cleanup:
    - "report_cleanup_stats"
    - "notify_if_space_freed"

# =============================================================================
# 监控和报告
# =============================================================================
monitoring:
  enabled: true
  
  stats:
    - "files_deleted"
    - "space_freed_mb"
    - "cleanup_duration_seconds"
    - "errors_encountered"
    
  reports:
    daily: true
    weekly: true
    
  alerts:
    - condition: "cleanup_failure"
      severity: "warning"
      
    - condition: "disk_space_critical"
      threshold_percent: 90
      severity: "critical"
